<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carnet UB - Carles</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone-screen">
    <section class="status-bar" aria-label="Estado del telefono">
      <span>11:32</span>
      <span class="status-icons">
        <span class="signal" aria-hidden="true"><i></i><i></i><i></i></span>
        <span>5G</span>
        <span class="battery">85</span>
      </span>
    </section>

    <header class="top-bar">
      <button class="icon-button" aria-label="Volver">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 4.5 8 12l7.5 7.5"/></svg>
      </button>
      <a class="top-title" href="/espacio">Universidad de Barcelona</a>
      <button class="icon-button" aria-label="Actualizar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 0 0-14.7-4.4M4 5v5h5M4 13a8 8 0 0 0 14.7 4.4M20 19v-5h-5"/></svg>
      </button>
    </header>

    <a class="name-banner" href="/espacio" aria-label="Espacio personal">
      CARLES SORIA CANDONA
    </a>

    <section class="card-content card-page">
      <div class="hero-id">
        <div class="avatar-placeholder">
          <div class="avatar-head"></div>
          <div class="avatar-body"></div>
          <p>¡Sube tu foto!</p>
          <strong>ub.edu/fotoub</strong>
        </div>
        <div class="ub-crest small" aria-label="Escudo UB">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <a class="time-card" href="/espacio" aria-label="Espacio personal">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 6v6l5 3"/></svg>
        <span>21-4-2026 11:32:05</span>
      </a>

      <dl class="student-data">
        <div>
          <dt>Código de barras</dt>
          <dd>2101503891</dd>
        </div>
        <div>
          <dt>Colectivo</dt>
          <dd>Estudiante (cad. 10-2026)</dd>
        </div>
        <div>
          <dt>Número de carnet</dt>
          <dd>1998 8210 1503 8912</dd>
        </div>
      </dl>

      <a class="barcode-area" href="/espacio" aria-label="Espacio personal">
        <div class="barcode"></div>
        <span>Clica para ampliar</span>
      </a>
    </section>

    <nav class="bottom-nav" aria-label="Navegacion inferior">
      <a class="active" href="/espacio">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5V21h-6v-6H9v6H3z"/></svg>
        <span>Inicio</span>
      </a>
      <a href="#">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a8 8 0 0 0 .1-6l2-1.5-2-3.5-2.4 1a8 8 0 0 0-5.2-3L11.5 0h-4l-.4 2.9A8 8 0 0 0 2 5L-.4 4l-2 3.5 2 1.5a8 8 0 0 0 .1 6l-2 1.5 2 3.5L2 19a8 8 0 0 0 5.2 3l.4 2.9h4l.4-2.9a8 8 0 0 0 5.2-3l2.4 1 2-3.5z"/></svg>
        <span>Configuración</span>
      </a>
      <a href="#">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="16" rx="1"/><path d="M8 3v4M16 3v4M4 10h16"/></svg>
        <span>Calendario</span>
      </a>
      <a href="#">
        <span class="dot"></span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9a6 6 0 0 1 12 0v5l2 3H4l2-3z"/><path d="M10 20h4"/></svg>
        <span>Alertas</span>
      </a>
      <a href="#">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="7"/><path d="m16 16 5 5"/></svg>
        <span>Buscar</span>
      </a>
    </nav>
  </main>
</body>
</html>
